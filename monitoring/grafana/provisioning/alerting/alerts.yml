apiVersion: 1

groups:
  - orgId: 1
    name: Travel Platform Alerts
    folder: Travel Analytics
    interval: 1m
    rules:
      - uid: user-events-failed-last-5m
        title: User Events Failed Last 5m
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: increase(events_failed_total[5m])
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: User event processing failures detected
        labels:
          severity: warning

      - uid: kafka-consumer-lag-high
        title: Kafka Consumer Lag High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(kafka_consumergroup_lag) by (consumergroup)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 100
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: Kafka consumer lag is above threshold
        labels:
          severity: warning