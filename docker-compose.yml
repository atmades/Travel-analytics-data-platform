services:
  mock_booking_api:
    build:
      context: ./services/mock_booking_api
    container_name: travel_mock_booking_api
    ports:
      - "8001:8000"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: travel_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: travel_user
      CLICKHOUSE_PASSWORD: travel_password
      CLICKHOUSE_DB: travel
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  airflow:
    image: apache/airflow:2.9.3
    container_name: travel_airflow
    depends_on:
      - clickhouse
      - mock_booking_api
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Maxim
        --lastname Nikitin
        --role Admin
        --email admin@example.com || true;
      airflow scheduler &
      airflow webserver
      "

volumes:
  clickhouse_data: