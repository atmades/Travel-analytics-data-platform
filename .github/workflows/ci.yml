name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-compile-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install dbt dependencies
        run: |
          python -m pip install -r requirements-dbt.txt

      - name: Run Ruff
        run: |
          python -m ruff check services airflow shared tests

      - name: Compile Python files
        run: |
          python -m compileall services airflow shared tests

      - name: Run unit tests
        run: |
          python -m pytest tests -v

      - name: Validate Docker Compose
        run: |
          docker compose config

      - name: dbt parse
        working-directory: dbt/travel_analytics
        run: |
          dbt parse --profiles-dir . --target local

      - name: dbt compile
        working-directory: dbt/travel_analytics
        run: |
          dbt compile --profiles-dir . --target local