services:
  mock_booking_api:
    build:
      context: ./services/mock_booking_api
    container_name: travel_mock_booking_api
    ports:
      - "8001:8000"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: travel_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: travel_user
      CLICKHOUSE_PASSWORD: travel_password
      CLICKHOUSE_DB: travel
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  airflow:
    image: apache/airflow:2.9.3
    container_name: travel_airflow
    depends_on:
      - clickhouse
      - mock_booking_api
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: standalone
  
  mock_ads_api:
    build: ./services/mock_ads_api
    container_name: travel_mock_ads_api
    ports:
      - "8002:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn services.mock_ads_api.app.main:app --host 0.0.0.0 --port 8000
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: travel_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: travel_kafka
    depends_on:
      - zookeeper
    ports:
      - "9095:9095"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  user_event_producer:
    build: ./services/user_event_producer
    container_name: travel_user_event_producer
    depends_on:
      - kafka
    restart: "no"
  
  user_event_consumer:
    build: ./services/user_event_consumer
    container_name: travel_user_event_consumer
    depends_on:
      - kafka
      - clickhouse
    restart: unless-stopped

volumes:
  clickhouse_data: