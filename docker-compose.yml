services:
  mock_booking_api:
    build:
      context: ./services/mock_booking_api
    container_name: travel_mock_booking_api
    ports:
      - "8001:8000"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: travel_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: travel_user
      CLICKHOUSE_PASSWORD: travel_password
      CLICKHOUSE_DB: travel
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  airflow:
    image: apache/airflow:2.9.3
    container_name: travel_airflow
    depends_on:
      - clickhouse
      - mock_booking_api
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: travel_user
      CLICKHOUSE_PASSWORD: travel_password    
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: standalone
  
  mock_ads_api:
    build: ./services/mock_ads_api
    container_name: travel_mock_ads_api
    ports:
      - "8002:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn services.mock_ads_api.app.main:app --host 0.0.0.0 --port 8000
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: travel_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: travel_kafka
    depends_on:
      - zookeeper
    ports:
      - "9095:9095"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  
  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: travel_kafka_ui
    depends_on:
      - kafka
      - schema_registry
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: travel-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema_registry:8081

  user_event_producer:
    build:
      context: .
      dockerfile: services/user_event_producer/Dockerfile
    container_name: travel_user_event_producer
    depends_on:
      - kafka
      - schema_registry
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema_registry:8081
      USER_EVENTS_TOPIC: user.events.avro
    restart: "no"
  
  user_event_consumer:
    build: ./services/user_event_consumer
    container_name: travel_user_event_consumer
    depends_on:
      - kafka
      - clickhouse
    ports:
      - "8010:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema_registry:8081
      USER_EVENTS_TOPIC: user.events.avro
      USER_EVENTS_GROUP_ID: user-event-clickhouse-consumer-observability-v4
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: travel_user
      CLICKHOUSE_PASSWORD: travel_password
    restart: unless-stopped
  
  postgres_source:
    image: postgres:16
    container_name: travel_postgres_source
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: source_user
      POSTGRES_PASSWORD: source_password
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"

  debezium:
    image: debezium/connect:2.6
    container_name: travel_debezium
    depends_on:
      - kafka
      - postgres_source
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: travel_debezium_connect
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
  
  orders_cdc_consumer:
    build: ./services/orders_cdc_consumer
    container_name: travel_orders_cdc_consumer
    depends_on:
      - kafka
      - clickhouse
    ports:
      - "8011:8002"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ORDERS_CDC_TOPIC: orders.public.orders
      ORDERS_CDC_GROUP_ID: orders-cdc-clickhouse-consumer
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: travel_user
      CLICKHOUSE_PASSWORD: travel_password
    restart: unless-stopped
  
  schema_registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: travel_schema_registry
    depends_on:
      - kafka
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    
  prometheus:
    image: prom/prometheus
    container_name: travel_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: travel_grafana
    ports:
      - "3000:3000"

volumes:
  clickhouse_data: